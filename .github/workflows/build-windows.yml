name: Build Windows (WPF)

on:
  push:
    branches: [ feature/wpf-monitor ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution (compile check)
        run: dotnet build AIVTuber.slnx -c Release

      - name: Publish single-file exe (win-x64, self-contained)
        run: dotnet publish App/App.csproj -c Release -r win-x64 -o publish

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath AIVTuber-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIVTuber-win-x64
          path: AIVTuber-win-x64.zip

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wpf-monitor-preview
          name: WPF 监控页预览（CI 构建，未人工验证）
          prerelease: true
          files: AIVTuber-win-x64.zip
          body: |
            Phase 1 WPF 仪表盘（监控页）预览构建，自 feature/wpf-monitor 分支自动编译。

            ⚠️ 仅保证 CI 在 Windows 上编译通过，未经人工运行验证。

            用法：下载 AIVTuber-win-x64.zip 解压 → 在 AIVTuber.exe 同目录放一份配好 LLM/TTS key 的 config.json（可用 config.json.template 改）→ 双击 AIVTuber.exe。
