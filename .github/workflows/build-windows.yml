name: Build Windows (WPF)

on:
  push:
    branches: [ feature/wpf-monitor ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-evidence:
    name: Windows baseline evidence (non-blocking)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup pinned .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Capture restore/build/test/audit/publish evidence
        shell: pwsh
        run: >-
          ./scripts/Invoke-VerificationBatch.ps1
          -OutputDirectory artifacts/verification-baseline
          -MinimumTests 1

      - name: Upload baseline evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-verification-baseline-${{ github.sha }}
          path: artifacts/verification-baseline
          if-no-files-found: error
          retention-days: 30
